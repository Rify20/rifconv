<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rifconv | rifdev</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-white flex items-center justify-center min-h-screen p-4 font-sans">
    <div class="w-full max-w-md text-center bg-[#161b2c] p-10 rounded-[3rem] border border-zinc-800 shadow-2xl">
        <h1 class="text-5xl font-black text-red-600 mb-2 tracking-tighter italic">rifconv</h1>
        <p class="text-zinc-500 mb-10 font-medium text-[10px] tracking-[0.3em] uppercase">Independent Converter by rifdev</p>
        
        <input id="url" type="text" placeholder="Paste link YouTube di sini..." 
               class="w-full p-5 rounded-2xl bg-[#0b0f1a] border border-zinc-800 mb-5 outline-none focus:border-red-600 text-center transition-all shadow-inner">
        
        <div class="flex flex-col gap-3">
            <button onclick="pancing('mp3')" class="bg-red-600 text-white p-5 rounded-2xl font-bold hover:bg-red-700 active:scale-95 transition-all shadow-lg">🎵 Convert to MP3</button>
            <button onclick="pancing('mp4')" class="bg-zinc-200 text-black p-5 rounded-2xl font-bold hover:bg-white active:scale-95 transition-all shadow-lg">🎬 Convert to MP4</button>
        </div>
        
        <div id="loading" class="hidden mt-8">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600 mx-auto"></div>
            <p id="status" class="mt-3 text-[10px] text-zinc-500 italic uppercase tracking-widest">Processing Video...</p>
        </div>

        <div class="mt-10 pt-6 border-t border-zinc-800 text-[9px] text-zinc-600 tracking-widest uppercase font-bold">
            rifconv v7.0 • Stable Edition
        </div>
    </div>

    <form id="pancingan" method="POST" action="https://y2mate.com.co/en/convert" target="_blank" class="hidden">
        <input type="hidden" name="url" id="formUrl">
    </form>

    <script>
        function pancing(format) {
            const videoUrl = document.getElementById('url').value;
            if (!videoUrl) return alert('Linknya mana, Rif?');

            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');

            // Kita pakai metode "Form Submission"
            // Ini cara paling mandiri untuk nembus blokir tanpa kena error 404 atau SSL
            const form = document.getElementById('pancingan');
            document.getElementById('formUrl').value = videoUrl;
            
            form.submit();

            setTimeout(() => {
                loading.classList.add('hidden');
                alert("Proses dimulai di tab baru. Tunggu tombol download muncul di sana.");
            }, 2000);
        }
    </script>
</body>
</html>
