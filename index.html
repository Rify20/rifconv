<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>rifconv by rifdev</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">
    <div class="text-center p-10 bg-zinc-900 rounded-3xl border border-zinc-800 shadow-2xl">
        <h1 class="text-4xl font-black text-red-600 mb-2">rifconv</h1>
        <p class="text-zinc-500 mb-8">YouTube MP3 & MP4 - No Ribet 24 Jam</p>
        
        <input id="url" type="text" placeholder="Paste link YouTube..." class="w-full p-4 rounded-xl bg-black border border-zinc-700 mb-4 outline-none focus:border-red-600">
        
        <div class="flex gap-2">
            <button onclick="convert('mp4')" class="flex-1 bg-white text-black p-4 rounded-xl font-bold hover:bg-zinc-200">Video MP4</button>
            <button onclick="convert('mp3')" class="flex-1 bg-red-600 text-white p-4 rounded-xl font-bold hover:bg-red-700">Audio MP3</button>
        </div>
        
        <p id="msg" class="mt-4 text-sm text-zinc-600"></p>
    </div>

    <script>
        async function convert(type) {
            const url = document.getElementById('url').value;
            if(!url) return alert('Linknya mana?');
            document.getElementById('msg').innerText = "Sedang memproses... Tunggu sebentar.";
            
            // Panggil API Python kita
            try {
                const res = await fetch(`/api/download?url=${encodeURIComponent(url)}&ext=${type}`);
                const finalUrl = await res.text();
                // Buka link video asli untuk didownload
                window.location.href = finalUrl;
                document.getElementById('msg').innerText = "Berhasil! Download akan dimulai.";
            } catch (e) {
                alert('Error atau URL tidak didukung');
            }
        }
    </script>
</body>
</html>
