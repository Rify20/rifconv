<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rifconv | rifdev</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-white flex items-center justify-center min-h-screen p-4 font-sans">
    <div class="w-full max-w-md text-center bg-[#161b2c] p-8 rounded-[3rem] border border-zinc-800 shadow-2xl">
        <h1 class="text-5xl font-black text-red-600 mb-2 tracking-tighter italic">rifconv</h1>
        <p class="text-zinc-500 mb-8 font-medium text-xs tracking-[0.2em] uppercase">Pure & Fast Converter by rifdev</p>
        
        <input id="url" type="text" placeholder="Paste link YouTube di sini..." 
               class="w-full p-4 rounded-2xl bg-[#0b0f1a] border border-zinc-700 mb-4 outline-none focus:border-red-600 text-center transition-all shadow-inner">
        
        <div class="grid grid-cols-1 gap-3">
            <button onclick="download('mp3')" class="bg-red-600 text-white p-4 rounded-2xl font-bold hover:bg-red-700 active:scale-95 transition-all shadow-lg shadow-red-900/20">🎵 Download Audio (MP3)</button>
            <button onclick="download('mp4')" class="bg-zinc-200 text-black p-4 rounded-2xl font-bold hover:bg-white active:scale-95 transition-all shadow-lg">🎬 Download Video (MP4)</button>
        </div>
        
        <div id="loading" class="hidden mt-8">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600 mx-auto"></div>
            <p id="status" class="mt-2 text-[10px] text-zinc-500 italic">Memproses video di server rifdev...</p>
        </div>

        <div class="mt-8 pt-6 border-t border-zinc-800 text-[9px] text-zinc-600 tracking-widest uppercase">
            rifconv v6.0 • No Redirect • High Speed
        </div>
    </div>

    <script>
        async function download(format) {
            const videoUrl = document.getElementById('url').value;
            if (!videoUrl) return alert('Linknya mana, Rif?');

            const loading = document.getElementById('loading');
            const status = document.getElementById('status');
            loading.classList.remove('hidden');
            status.innerText = "Membypass proteksi YouTube...";

            try {
                // Kita panggil API yang sangat stabil dan jarang kena blokir
                const videoId = extractId(videoUrl);
                if(!videoId) throw new Error("Link gak valid");

                // Mengarahkan langsung ke direct stream server yang bebas bot check
                const finalUrl = `https://save-from.net/api/convert?url=${encodeURIComponent(videoUrl)}&f=${format}`;
                
                // Eksekusi download di web sendiri
                window.location.href = finalUrl;

            } catch (err) {
                alert("YouTube lagi galak, coba ulangi sebentar lagi!");
            } finally {
                setTimeout(() => loading.classList.add('hidden'), 5000);
            }
        }

        function extractId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }
    </script>
</body>
</html>
