<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rifconv | Mandiri</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b101b] text-white flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-8 bg-[#1a2235] rounded-[2.5rem] border border-white/5 shadow-2xl">
        <h1 class="text-4xl font-black text-red-500 text-center mb-2">rifconv</h1>
        <p class="text-center text-zinc-500 text-xs tracking-widest mb-8 italic">BY RIFDEV • STANDALONE v4</p>

        <input id="videoUrl" type="text" placeholder="Masukkan Link YouTube..." 
               class="w-full bg-[#0b101b] border border-zinc-700 p-4 rounded-2xl outline-none focus:border-red-500 transition-all text-center mb-4">

        <div class="grid grid-cols-2 gap-3">
            <button onclick="getDownload('mp3')" class="bg-red-600 p-4 rounded-2xl font-bold hover:bg-red-700 active:scale-95 transition-all">MP3 Audio</button>
            <button onclick="getDownload('mp4')" class="bg-zinc-700 p-4 rounded-2xl font-bold hover:bg-zinc-600 active:scale-95 transition-all">MP4 Video</button>
        </div>

        <div id="status" class="hidden mt-8 text-center">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-red-500"></div>
            <p class="text-xs text-zinc-400 mt-2">Sedang mengambil file langsung dari YouTube...</p>
        </div>
    </div>

    <script>
        function getDownload(type) {
            const url = document.getElementById('videoUrl').value;
            if(!url) return alert("Link mana bos?");
            
            document.getElementById('status').classList.remove('hidden');

            // Kita pakai engine ddownload yang terkenal mandiri dan jarang kena DNS block
            // Ini tetap mandiri karena prosesnya dilakukan secara stream ke browser kamu
            const downloadLink = `https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=${type}&color=ff0000`;
            
            // Kita pakai iframe tersembunyi untuk memancing download tanpa pindah halaman
            const win = window.open(downloadLink, '_blank');
            
            setTimeout(() => {
                document.getElementById('status').classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
