<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rifconv by rifdev</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-white flex items-center justify-center min-h-screen p-4 font-sans">
    <div class="w-full max-w-md text-center bg-[#161b2c] p-8 rounded-[2rem] border border-zinc-800 shadow-2xl">
        <h1 class="text-5xl font-black text-red-600 mb-2 tracking-tighter">rifconv</h1>
        <p class="text-zinc-500 mb-8 font-medium text-sm italic">YouTube Converter by rifdev</p>
        
        <input id="url" type="text" placeholder="Tempel link YouTube di sini..." 
               class="w-full p-4 rounded-2xl bg-[#0b0f1a] border border-zinc-700 mb-4 outline-none focus:border-red-600 text-center transition-all">
        
        <div class="grid grid-cols-2 gap-3">
            <button onclick="downloadYouTube('mp4')" class="bg-white text-black p-4 rounded-2xl font-bold hover:bg-zinc-200 active:scale-95 transition-all">🎬 Video MP4</button>
            <button onclick="downloadYouTube('mp3')" class="bg-red-600 text-white p-4 rounded-2xl font-bold hover:bg-red-700 active:scale-95 transition-all">🎵 Audio MP3</button>
        </div>
        
        <div id="status" class="hidden mt-6">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600 mx-auto"></div>
            <p id="statusText" class="mt-2 text-xs text-zinc-500 italic">Menghubungkan ke server...</p>
        </div>
    </div>

    <script>
        async function downloadYouTube(format) {
            const inputUrl = document.getElementById('url').value;
            if (!inputUrl) return alert('Masukkan linknya dulu, rif!');

            const status = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            status.classList.remove('hidden');
            statusText.innerText = "Membypass proteksi YouTube...";

            try {
                // Kita pakai API publik khusus downloader yang lebih kuat dari yt-dlp di Vercel
                const apiUrl = `https://api.vevioz.com/api/button/${format === 'mp3' ? 'mp3' : 'videos'}?url=${encodeURIComponent(inputUrl)}`;
                
                // Cara ini paling aman: Kita arahkan user ke halaman download API yang sudah matang
                // Ini mirip seperti cara kerja y2mate yang asli
                window.location.href = apiUrl;

                setTimeout(() => {
                    status.classList.add('hidden');
                }, 5000);

            } catch (error) {
                alert('Server sedang penuh, coba lagi nanti!');
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
