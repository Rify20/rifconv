<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rifconv by rifdev</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-white min-h-screen flex items-center justify-center font-sans">
    <div class="w-full max-w-md p-8 bg-[#161b2c] rounded-[2.5rem] border border-zinc-800 shadow-2xl">
        <h1 class="text-4xl font-black text-red-600 text-center mb-1 italic">rifconv</h1>
        <p class="text-zinc-500 text-center text-[10px] tracking-widest uppercase mb-8">Full Mandiri by rifdev</p>

        <input id="url" type="text" placeholder="Masukkan Link YouTube..." 
               class="w-full p-4 rounded-2xl bg-[#0b0f1a] border border-zinc-700 mb-4 outline-none focus:border-red-600 text-center transition-all shadow-inner">

        <div class="grid grid-cols-2 gap-3">
            <button onclick="startDownload('mp3')" id="btn-mp3" class="bg-red-600 p-4 rounded-2xl font-bold hover:bg-red-700 active:scale-95 transition-all shadow-lg">MP3 Audio</button>
            <button onclick="startDownload('mp4')" id="btn-mp4" class="bg-zinc-100 text-black p-4 rounded-2xl font-bold hover:bg-white active:scale-95 transition-all shadow-lg">MP4 Video</button>
        </div>

        <div id="loading" class="hidden mt-8 text-center">
            <div class="animate-bounce text-red-500 font-bold text-sm">Sedang Menyiapkan File...</div>
            <p class="text-[10px] text-zinc-500 mt-2 italic">Jangan tutup halaman, file akan otomatis terdownload</p>
        </div>
    </div>

    <script>
        function startDownload(type) {
            const url = document.getElementById('url').value;
            if(!url) return alert('Linknya kosong, Rif!');

            document.getElementById('loading').classList.remove('hidden');
            
            // Proses download langsung dari API web kamu sendiri
            window.location.href = `/api/download?url=${encodeURIComponent(url)}&type=${type}`;
            
            // Sembunyikan loading setelah beberapa detik karena browser mulai mendownload
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 10000);
        }
    </script>
</body>
</html>
